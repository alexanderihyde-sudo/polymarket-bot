<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POLYBOT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f4f3ee; --paper:#faf9f5; --paper2:#eeede7;
    --ink:#111; --ink2:#5e5e57; --ink3:#8f8f86;
    --line:rgba(0,0,0,.12); --line2:rgba(0,0,0,.22);
    --lime:#c8fa3c; --lime-d:#9fe016;
    --disp:'Archivo',-apple-system,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace; --serif:'Instrument Serif',serif;
    --ease:cubic-bezier(.22,1,.36,1);
    --curvefill:rgba(0,0,0,.05); --ghost:rgba(0,0,0,.07); --passbg:rgba(250,249,245,.92);
  }
  body.dark{
    --cream:#0a0a0b; --paper:#141416; --paper2:#1a1a1c;
    --ink:#f4f3ee; --ink2:#a8a8a2; --ink3:#6e6e68;
    --line:rgba(255,255,255,.1); --line2:rgba(255,255,255,.2);
    --curvefill:rgba(255,255,255,.07); --ghost:rgba(255,255,255,.06); --passbg:rgba(18,18,20,.92);
  }
  body.dark .pill i{background:#0d1500}
  *{box-sizing:border-box;margin:0}
  html{background:var(--cream)}
  body{background:var(--cream);color:var(--ink);font-family:var(--disp);-webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;min-height:100vh;overflow-x:hidden}
  .mono{font-family:var(--mono)} .num{font-variant-numeric:tabular-nums slashed-zero}
  .lab{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3)}
  .up{color:var(--ink)} .dn{color:var(--ink3)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ── HERO ───────────────────────────────────────────────── */
  #hero{position:relative;overflow:hidden;isolation:isolate;padding:0 0 40px;border-bottom:1px solid var(--line);min-height:clamp(470px,66vh,770px)}
  .herowrap{position:absolute;top:50%;left:58%;transform:translate(-50%,-50%);height:clamp(560px,120vh,1340px);z-index:-1;pointer-events:auto;backface-visibility:hidden}
  .heroimg{display:block;height:100%;width:auto;user-select:none;-webkit-user-drag:none;filter:drop-shadow(0 30px 46px rgba(0,0,0,.10))}
  body.dark .heroimg{filter:drop-shadow(0 26px 36px rgba(0,0,0,.55))}
  .camoclip{position:absolute;inset:0;pointer-events:none;-webkit-mask-image:var(--chrome);mask-image:var(--chrome);-webkit-mask-size:100% 100%;-webkit-mask-repeat:no-repeat;-webkit-mask-position:center;mask-size:100% 100%;mask-repeat:no-repeat;mask-position:center}
  .camoreveal{position:absolute;inset:0;opacity:0;transition:opacity .3s var(--ease);mix-blend-mode:overlay;background:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27240%27%20height%3D%27240%27%20viewBox%3D%270%200%20240%20240%27%3E%3Cdefs%3E%3Cfilter%20id%3D%27p%27%3E%3CfeTurbulence%20type%3D%27fractalNoise%27%20baseFrequency%3D%270.011%27%20numOctaves%3D%273%27%20seed%3D%276%27%20stitchTiles%3D%27stitch%27%20result%3D%27n%27%2F%3E%3CfeComponentTransfer%20in%3D%27n%27%20result%3D%27m%27%3E%3CfeFuncA%20type%3D%27discrete%27%20tableValues%3D%270%200%200%201%201%200%200%27%2F%3E%3C%2FfeComponentTransfer%3E%3CfeComposite%20in%3D%27SourceGraphic%27%20in2%3D%27m%27%20operator%3D%27in%27%2F%3E%3C%2Ffilter%3E%3Cfilter%20id%3D%27q%27%3E%3CfeTurbulence%20type%3D%27fractalNoise%27%20baseFrequency%3D%270.015%27%20numOctaves%3D%273%27%20seed%3D%2719%27%20stitchTiles%3D%27stitch%27%20result%3D%27n%27%2F%3E%3CfeComponentTransfer%20in%3D%27n%27%20result%3D%27m%27%3E%3CfeFuncA%20type%3D%27discrete%27%20tableValues%3D%270%200%201%201%200%200%200%27%2F%3E%3C%2FfeComponentTransfer%3E%3CfeComposite%20in%3D%27SourceGraphic%27%20in2%3D%27m%27%20operator%3D%27in%27%2F%3E%3C%2Ffilter%3E%3C%2Fdefs%3E%3Crect%20width%3D%27240%27%20height%3D%27240%27%20fill%3D%27%23c8fa3c%27%2F%3E%3Crect%20width%3D%27240%27%20height%3D%27240%27%20fill%3D%27%231a1a14%27%20filter%3D%27url%28%23p%29%27%2F%3E%3Crect%20width%3D%27240%27%20height%3D%27240%27%20fill%3D%27%236f7d2e%27%20filter%3D%27url%28%23q%29%27%2F%3E%3C%2Fsvg%3E") center/260px;-webkit-mask:radial-gradient(circle 240px at var(--mx,50%) var(--my,50%),#000 28%,transparent 72%) center/100% 100% no-repeat;mask:radial-gradient(circle 240px at var(--mx,50%) var(--my,50%),#000 28%,transparent 72%) center/100% 100% no-repeat}
  /* camo revealed via JS pointer tracking on the hero (smooth, no toggle) */
  @media (hover:none){.camoreveal{display:none}}
  @keyframes heroFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-16px) rotate(.55deg)}}
  .labrow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid var(--line)}
  .labrow:last-child{border-bottom:none}
  .band{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase;margin-left:6px}
  .ltag{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid var(--line2);color:var(--ink3);white-space:nowrap}
  .ltag.promising{background:var(--ink);color:var(--cream);border-color:var(--ink)}
  .ltag.rejected{color:var(--ink2)}
  .ltag.testing{color:var(--ink3);border-style:dashed}
  @media (max-width:760px){.herowrap{opacity:.16;left:50%}}
  #curveband{border-bottom:1px solid var(--line)}
  .contours{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .ghost{position:absolute;top:18%;left:-2vw;font-weight:900;font-size:34vw;line-height:.74;
    color:transparent;-webkit-text-stroke:1.5px var(--ghost);white-space:nowrap;pointer-events:none;user-select:none}
  .bar{position:relative;z-index:3;display:flex;align-items:flex-start;justify-content:space-between;padding:26px 40px 0}
  .wordmark{font-weight:900;font-size:clamp(22px,2.4vw,30px);line-height:.82;letter-spacing:-.02em}
  .nav{display:flex;align-items:center;gap:12px}
  .pill{display:inline-flex;align-items:center;gap:8px;background:var(--lime);color:#0d1500;
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;padding:10px 17px;border-radius:30px}
  .pill i{width:7px;height:7px;border-radius:50%;background:#0d1500;display:inline-block;animation:pulse 2.4s var(--ease) infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .menu{width:42px;height:42px;border:1px solid var(--line2);border-radius:11px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:5px;cursor:pointer}
  .menu i{width:16px;height:1.5px;background:var(--ink)}
  .metaline{position:relative;z-index:2;display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;padding:34px 40px 0}
  .metaline .chg{font-weight:800;font-size:clamp(15px,1.5vw,19px)}
  .metaline .chgpct{font-weight:700;font-size:clamp(15px,1.5vw,19px);color:var(--ink3)}
  #equity{position:relative;z-index:1;font-weight:900;font-size:clamp(56px,11vw,230px);line-height:.82;
    letter-spacing:-.055em;white-space:nowrap;padding:6px 0 0 38px;font-variant-numeric:tabular-nums}
  #curve{position:relative;width:100%;height:clamp(150px,21vh,260px);margin-top:0}
  #curve svg{display:block}
  .pass{position:absolute;z-index:3;left:40px;bottom:26px;width:248px;border:1px solid var(--line2);border-radius:13px;
    padding:15px 17px;background:var(--passbg);backdrop-filter:blur(3px)}
  .pass .top{display:flex;justify-content:space-between;align-items:baseline}
  .pass .big{font-weight:900;font-size:30px;letter-spacing:-.03em}
  .pass .foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:10px;margin-top:11px}
  .badge{font-family:var(--mono);font-size:9px;letter-spacing:.12em;background:var(--ink);color:var(--lime);padding:3px 8px;border-radius:4px}

  /* ── DATA (editorial, light) ────────────────────────────── */
  main{max-width:1280px;margin:0 auto;padding:0 40px}
  .stats{display:flex;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .stat{flex:1;min-width:150px;padding:28px 4px 26px;border-right:1px solid var(--line)}
  .stat:last-child{border-right:none}
  .stat .v{font-weight:800;font-size:clamp(24px,2.6vw,34px);letter-spacing:-.02em;margin-top:10px}
  .block{padding:40px 0 34px;border-bottom:1px solid var(--line)}
  .sec{font-family:var(--serif);font-style:italic;font-weight:400;font-size:30px;color:var(--ink);margin-bottom:22px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:17px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row .name{font-weight:700;font-size:16px}
  .row .meta{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-top:4px}
  .row .val{font-weight:700;font-size:17px;min-width:104px;text-align:right;font-variant-numeric:tabular-nums}
  .rt{display:flex;align-items:center;gap:22px}
  .gate{padding:6px 0}
  .gate .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .gate .ln{font-family:var(--mono);font-size:12px;color:var(--ink2);letter-spacing:.02em}
  footer{max-width:1280px;margin:0 auto;padding:26px 40px 48px;display:flex;gap:24px;flex-wrap:wrap;
    font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3)}
  @media (max-width:640px){.bar,.metaline,main,footer{padding-left:22px;padding-right:22px}#equity{padding-left:20px}.pass{left:22px}}
</style>
</head>

<script>
"use strict";
const $ = id => document.getElementById(id);
const fmt = (v,d=2) => Math.abs(v).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const usd = v => (v<0?"-$":"$")+fmt(v);
const usd0 = v => (v<0?"-$":"$")+fmt(v,0);
const signed = v => (v>=0?"+$":"-$")+fmt(v);
const pct = v => (v==null?"—":(v*100).toFixed(1)+"%");
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const NAMES = {arbitrage:"Arbitrage", high_prob:"Heavy favorites", news:"News reaction", explore:"Explorer", daytrade:"Day trading"};
let S=null, prevTotal=null, drew=false;
let DARK = localStorage.getItem("theme")==="dark";
const INK=()=>DARK?"#f4f3ee":"#111", INK3=()=>DARK?"#6e6e68":"#8f8f86", FILL=()=>DARK?"rgba(255,255,255,.07)":"rgba(0,0,0,.05)";

function curveSVG(hist){
  const vals = hist.map(p=>p.total).filter(v=>typeof v==="number");
  if(vals.length<2) return "";
  const N=200, step=Math.max(1,Math.floor(vals.length/N));
  const pts=vals.filter((_,i)=>i%step===0); if(pts[pts.length-1]!==vals[vals.length-1]) pts.push(vals[vals.length-1]);
  const min=Math.min(...pts), max=Math.max(...pts), span=(max-min)||1;
  const W=1000,H=240;
  const xy=pts.map((v,i)=>[i/(pts.length-1)*W, H-14-((v-min)/span)*(H-28)]);
  const line=xy.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const area=line+" "+W+","+H+" 0,"+H;
  const last=xy[xy.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" preserveAspectRatio="none">`+
    `<polygon points="${area}" fill="${FILL()}"/>`+
    `<polyline class="cline" points="${line}" fill="none" stroke="${INK()}" stroke-width="3.2" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>`+
    `<circle cx="${Math.min(W-9,last[0]).toFixed(1)}" cy="${last[1].toFixed(1)}" r="6" fill="#c8fa3c" stroke="#111" stroke-width="2" vector-effect="non-scaling-stroke"/></svg>`;
}
function spark(vals){
  if(!vals||vals.length<2) return "";
  const N=40, step=Math.max(1,Math.floor(vals.length/N));
  const p=vals.filter((_,i)=>i%step===0).slice(-N);
  const min=Math.min(...p),max=Math.max(...p),span=(max-min)||1, w=86,h=26;
  const pts=p.map((v,i)=>`${(i/(p.length-1)*w).toFixed(1)},${(h-1-((v-min)/span)*(h-2)).toFixed(1)}`).join(" ");
  const col=p[p.length-1]>=p[0]?INK():INK3();
  return `<svg width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5"/></svg>`;
}
function countTo(el,to){
  const first = prevTotal==null, from = first?0:prevTotal;
  if(!first && Math.abs(to-from)<0.01){ el.textContent=usd(to); return; }
  const dur=first?1200:650, t0=performance.now();
  (function step(t){ const k=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-k,3);
    el.textContent=usd(from+(to-from)*e); if(k<1) requestAnimationFrame(step); })(t0);
}

function render(){
  const a=S.account||{}, hist=S.history||[], m=S.metrics||{};
  const diff=(a.total||0)-(a.starting_cash||10000), pc=a.starting_cash?100*diff/a.starting_cash:0;
  countTo($("equity"), a.total||0); prevTotal=a.total;
  $("chg").textContent = (diff>=0?"▲ ":"▼ ")+signed(diff);
  $("chgpct").textContent = (diff>=0?"+":"")+pc.toFixed(2)+"%";
  $("curve").innerHTML = curveSVG(hist);
  if(!drew){ drew=true; const l=document.querySelector(".cline");
    if(l && l.getTotalLength){ const len=l.getTotalLength(); l.style.strokeDasharray=len; l.style.strokeDashoffset=len;
      l.getBoundingClientRect(); l.style.transition="stroke-dashoffset 1.1s "+getComputedStyle(document.body).getPropertyValue("--ease"); l.style.strokeDashoffset=0; } }

  const ce=S.crypto_edge||{};
  $("pass").innerHTML =
    `<div class="top"><span class="lab">Paper pass</span><span class="lab">est. 2026</span></div>`+
    `<div style="display:flex;align-items:center;gap:12px;margin:11px 0 2px"><div class="big num">${pct(m.win_rate)}</div>`+
    `${spark(hist.map(p=>p.total))}</div>`+
    `<div class="foot"><span class="mono" style="font-size:10px;color:var(--ink2)">${S.settled_total||0} SETTLED · SINCE JUN 22</span>`+
    `<span class="badge">ARB PROVEN</span></div>`;

  $("stats").innerHTML =
    stat("Cash", usd0(a.cash||0)) + stat("Deployed", usd0(a.invested||0)) +
    stat("Realized", (a.realized_pnl>=0?"+":"")+usd(a.realized_pnl||0)) +
    stat("Win rate", pct(m.win_rate)) + stat("Settled", S.settled_total||0);

  let st="";
  for(const [k,A] of Object.entries(S.accounts||{})){
    const pnl=(A.realized||0)+(A.unrealized||0);
    const series=hist.map(p=>p.strat&&p.strat[k]).filter(v=>v!=null);
    st += `<div class="row"><div><div class="name">${esc(NAMES[k]||k)}</div>`+
      `<div class="meta">${A.open||0} open · ${A.trades||0} done · ${(pnl>=0?"+":"")+usd(pnl)}</div></div>`+
      `<div class="rt">${spark(series)}<span class="val num">${usd0(A.value||0)}</span></div></div>`;
  }
  $("strats").innerHTML = st || `<div class="meta">no strategies yet</div>`;

  if(ce && ce.n){
    const lo=0.5, hi=1, f=x=>Math.max(0,Math.min(1,(x-lo)/(hi-lo)));
    const v=f(ce.wilson_lower), t=f(ce.mean_entry||0), met=ce.gate_met;
    $("gate").innerHTML =
      `<div class="top"><span class="lab">Calibration gate — ${met?"clear":"shut"}</span>`+
      `<span class="ln">win ${ce.win_pct}% · ci-lo ${(ce.wilson_lower*100).toFixed(1)}% vs ${Math.round((ce.mean_entry||0)*100)}¢ entry · ${ce.n}/${ce.target}</span></div>`+
      `<svg viewBox="0 0 1000 26" width="100%" height="26" preserveAspectRatio="none">`+
      `<line x1="0" y1="17" x2="1000" y2="17" stroke="${INK()}" stroke-width="1" opacity=".18"/>`+
      `<line x1="0" y1="17" x2="${(v*1000).toFixed(0)}" y2="17" stroke="${INK()}" stroke-width="3"/>`+
      `<line x1="${(t*1000).toFixed(0)}" y1="1" x2="${(t*1000).toFixed(0)}" y2="25" stroke="#9fe016" stroke-width="2.5" vector-effect="non-scaling-stroke"/>`+
      `<circle cx="${(v*1000).toFixed(0)}" cy="17" r="4.5" fill="${INK()}" vector-effect="non-scaling-stroke"/></svg>`;
  } else $("gate").innerHTML = `<div class="ln">no crypto settles yet</div>`;

  const rec=(S.settled||[]).slice(0,7);
  $("recent").innerHTML = rec.map(t=>{
    const up=(t.pnl||0)>=0;
    return `<div class="row"><div><div class="name">${esc((t.name||"—").slice(0,46))}</div>`+
      `<div class="meta">${esc(NAMES[t.strategy]||t.strategy||"")} · ${esc(t.category||"")}</div></div>`+
      `<span class="val num">${up?"▲ ":"▼ "}${signed(t.pnl||0)}</span></div>`;
  }).join("") || `<div class="meta">nothing settled yet</div>`;

  renderPositions(); renderCalendar(); renderWaterfall(); renderLab();
  $("foot").innerHTML =
    `<span>Polybot · paper money · nothing real at risk</span>`+
    `<span>since reset · ${S.settled_total||0} settled</span>`+
    `<span>crypto gate ${ce.gate_met?"clear":"shut"} · ${ce.n||0}/${ce.target||400}</span>`;
}
function stat(k,v){ return `<div class="stat"><div class="lab">${k}</div><div class="v num">${v}</div></div>`; }
function renderLab(){
  const L=S.strategy_lab, el=$("lab"); if(!el||!L){ if(el) el.innerHTML=`<div class="meta">starting up…</div>`; return; }
  const head=`<div class="ln" style="margin-bottom:18px"><b style="font-size:15px">${L.total}</b> candidate strategies under shadow test &nbsp;·&nbsp; `+
    `<b>${L.promising}</b> promising · ${L.with_data} with data · ${L.rejected} rejected · ${L.testing} gathering</div>`;
  const rows=(L.top||[]).slice(0,18).map(x=>{
    const meta = x.n ? `${x.n} settles · ${x.win_pct}% vs ${Math.round(x.base*100)}¢ · ci-lo ${(x.wilson_lower*100).toFixed(0)}%` : "awaiting data";
    return `<div class="labrow"><div><span class="name" style="font-size:13.5px;display:inline">${esc(x.cat)}</span><span class="band">${x.band}</span></div>`+
      `<div class="rt"><span class="meta" style="text-transform:none;letter-spacing:.01em">${meta}</span>`+
      `<span class="ltag ${x.status}">${x.status}</span></div></div>`;
  }).join("");
  el.innerHTML = head + `<div>${rows}</div>`+
    `<div class="meta" style="margin-top:16px;text-transform:none;letter-spacing:.03em">shadow / paper · a candidate is sized only once it beats its priced baseline with confidence — none have</div>`;
}
function renderPositions(){
  const ps=(S.positions||[]);
  $("positions").innerHTML = ps.slice(0,12).map(p=>
    `<div class="row"><div><div class="name">${esc((p.name||"—").slice(0,48))}</div>`+
    `<div class="meta">${esc(NAMES[p.strategy]||p.strategy||"")} · ${esc(p.category||"")}</div></div>`+
    `<span class="val num">${usd(p.cost||0)}</span></div>`).join("") || `<div class="meta">no open positions</div>`;
}
function renderCalendar(){
  const pc=(S.pnl_curve||[]); if(!pc.length){ $("cal").innerHTML=`<div class="meta">no daily history yet</div>`; return; }
  const byDay={}; for(const p of pc){ if(!p.t) continue; byDay[String(p.t).slice(0,10)]=p.cum; }
  const days=Object.keys(byDay).sort(); let prev=0; const daily=days.map(d=>{ const v=byDay[d]-prev; prev=byDay[d]; return {d,v}; });
  let mag=0.01; daily.forEach(x=>{ mag=Math.max(mag,Math.abs(x.v)); });
  const cols=Math.min(daily.length,46), shown=daily.slice(-cols), cell=18, gap=5, w=cols*(cell+gap), ink=INK();
  let svg=`<svg viewBox="0 0 ${w} ${cell+2}" width="100%" height="${cell+2}" preserveAspectRatio="xMinYMid meet">`;
  shown.forEach((x,i)=>{ const xx=i*(cell+gap);
    if(x.v>=0) svg+=`<rect x="${xx}" y="1" width="${cell}" height="${cell}" rx="2" fill="${ink}" opacity="${(0.15+0.78*Math.min(1,Math.abs(x.v)/mag)).toFixed(2)}"><title>${x.d} ${signed(x.v)}</title></rect>`;
    else svg+=`<rect x="${xx+0.5}" y="1.5" width="${cell-1}" height="${cell-1}" rx="2" fill="none" stroke="${ink}" stroke-width="1.1" opacity="${(0.3+0.55*Math.min(1,Math.abs(x.v)/mag)).toFixed(2)}"><title>${x.d} ${signed(x.v)}</title></rect>`;
  });
  svg+=`</svg>`;
  const wins=daily.filter(x=>x.v>0).length;
  $("cal").innerHTML = svg + `<div class="meta" style="margin-top:13px">${wins}/${daily.length} up days · filled = up · outline = down</div>`;
}
function renderWaterfall(){
  const s=(S.settled||[]); if(!s.length){ $("water").innerHTML=`<div class="meta">nothing settled yet</div>`; return; }
  const recent=s.slice(0,30).reverse(); let run=0;
  const steps=recent.map(t=>{ const p=+t.pnl||0, lo=run; run+=p; return {p,lo,hi:run}; });
  let min=0,max=0; steps.forEach(st=>{ min=Math.min(min,st.lo,st.hi); max=Math.max(max,st.lo,st.hi); });
  const n=steps.length, W=1000, H=190, pad=8, span=(max-min)||1, bw=(W-pad*2)/n, y=v=>H-pad-((v-min)/span)*(H-pad*2), ink=INK();
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="190" preserveAspectRatio="none">`;
  svg+=`<line x1="0" y1="${y(0).toFixed(1)}" x2="${W}" y2="${y(0).toFixed(1)}" stroke="${ink}" stroke-width="1" opacity=".22"/>`;
  steps.forEach((st,i)=>{ const x=pad+i*bw+bw*0.18, w=Math.max(1.5,bw*0.64), yA=y(Math.max(st.lo,st.hi)), hgt=Math.max(1.5,y(Math.min(st.lo,st.hi))-yA);
    if(st.p>=0) svg+=`<rect x="${x.toFixed(1)}" y="${yA.toFixed(1)}" width="${w.toFixed(1)}" height="${hgt.toFixed(1)}" fill="${ink}"/>`;
    else svg+=`<rect x="${(x+0.6).toFixed(1)}" y="${(yA+0.6).toFixed(1)}" width="${(w-1.2).toFixed(1)}" height="${Math.max(1,hgt-1.2).toFixed(1)}" fill="none" stroke="${ink}" stroke-width="1.3"/>`;
  });
  svg+=`</svg>`;
  $("water").innerHTML = svg + `<div class="meta" style="margin-top:13px">running ${signed(run)} over last ${n} · filled = win · outline = loss</div>`;
}

async function load(){
  try{ const r=await fetch("/api/state",{cache:"no-store"}); if(!r.ok) return; S=await r.json(); render(); }
  catch(e){}
}
if(DARK) document.body.classList.add("dark");
$("menu").addEventListener("click",()=>{ DARK=!DARK; document.body.classList.toggle("dark",DARK);
  localStorage.setItem("theme",DARK?"dark":"light"); if(S) render(); });
const _hw=$("herowrap"),_cr=$("camoreveal"),_he=_hw&&_hw.parentElement;
if(_hw&&_cr&&_he){_he.addEventListener("mousemove",function(e){var r=_hw.getBoundingClientRect();_cr.style.setProperty("--mx",(e.clientX-r.left).toFixed(0)+"px");_cr.style.setProperty("--my",(e.clientY-r.top).toFixed(0)+"px");_cr.style.opacity="1";});_he.addEventListener("mouseleave",function(){_cr.style.opacity="0";});}
load(); setInterval(load, 4000);
</script>
